name: Build llama.cpp for aarch64 Linux

on:
  workflow_dispatch:
    inputs:
      llama_tag:
        description: 'llama.cpp release tag (e.g. b8261)'
        required: false
        default: 'b8261'

jobs:
  build-aarch64:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.event.inputs.llama_tag }}
          depth: 1

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            cmake \
            ninja-build

      - name: Build
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/aarch64-linux-gnu.cmake \
            -DGGML_OPENMP=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON

          cmake --build build --config Release -j$(nproc)

      - name: Package binaries
        run: |
          mkdir -p artifact/bin
          cp build/bin/llama-cli artifact/bin/
          cp build/bin/llama-server artifact/bin/
          cp build/bin/llama-quantize artifact/bin/
          cp build/bin/llama-imatrix artifact/bin/
          tar -czvf llama-${{ github.event.inputs.llama_tag }}-aarch64-linux.tar.gz -C artifact .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-${{ github.event.inputs.llama_tag }}-aarch64-linux
          path: llama-${{ github.event.inputs.llama_tag }}-aarch64-linux.tar.gz
          retention-days: 7
